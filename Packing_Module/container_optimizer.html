<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Pumps - R&D Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        
        <!-- Header Section -->
        <div class="dashboard-card p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-6 overflow-hidden">
            <div class="flex items-center gap-5">
                <div class="bg-white p-2 rounded-xl border shadow-sm">
                    <img src="prakash logo.jfif" alt="Prakash Logo" class="h-12 w-auto">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-slate-900 uppercase">Prakash Pumps</h1>
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em]">R&D Optimization Module</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center bg-slate-50 border rounded-2xl p-1 pr-4 shadow-sm">
                    <div class="bg-slate-900 text-white text-[9px] font-black px-3 py-2 rounded-xl mr-3 uppercase">Profile</div>
                    <select id="contType" onchange="runOptimization()" class="font-bold text-sm outline-none bg-transparent cursor-pointer">
                        <option value="20ft">20' Std (28.0 CBM)</option>
                        <option value="40ft">40' HC (76.4 CBM)</option>
                    </select>
                </div>
                <img src="prakash.jfif" alt="Prakash Pumps" class="h-20 w-auto rounded-2xl shadow-md hidden lg:block">
            </div>
        </div>

        <!-- Input Form -->
        <div class="dashboard-card p-8 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-6 items-end">
                <div class="col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Model</label>
                    <input type="text" id="mName" value="NRV" class="w-full uppercase">
                </div>
                <div class="flex gap-2 md:col-span-2 text-center">
                    <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">L</label><input type="number" id="pL" value="138" class="w-full text-center"></div>
                    <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">W</label><input type="number" id="pW" value="138" class="w-full text-center"></div>
                    <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">H</label><input type="number" id="pH" value="116" class="w-full text-center"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-500 uppercase mb-2 block">Qty</label>
                    <input type="number" id="pQty" value="500" class="w-full text-blue-600">
                </div>
                <button onclick="addAndPack()" class="bg-slate-900 text-white font-bold py-3 px-8 rounded-xl hover:bg-blue-700 transition uppercase text-sm">Analyze Load</button>
            </div>
        </div>

        <!-- Metrics Section -->
        <div class="grid grid-cols-3 gap-6 mb-10 text-center">
            <div class="dashboard-card p-6 border-t-4 border-slate-900">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">CBM Occupied</p>
                <h2 id="usedCBM" class="text-3xl font-extrabold text-black">0.00</h2>
            </div>
            <div class="dashboard-card p-6 border-t-4 border-slate-300">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Free Capacity</p>
                <h2 id="freeCBM" class="text-3xl font-extrabold text-black">28.00</h2>
            </div>
            <div id="percBox" class="dashboard-card p-6 border-t-4 border-blue-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Load %</p>
                <h2 id="loadPerc" class="text-3xl font-extrabold text-blue-600">0%</h2>
            </div>
        </div>

        <!-- Report Table -->
        <div class="dashboard-card overflow-hidden mb-12">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                        <th class="p-6">Model Info</th>
                        <th class="p-6">Size (Inch)</th>
                        <th class="p-6 text-center">Arrangement</th>
                        <th class="p-6 text-center">Qty / Crate</th>
                        <th class="p-6 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableData" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <!-- Visualization -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-16">
            <div id="frontView" class="container-box dashboard-card"></div>
            <div id="topView" class="container-box dashboard-card"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
