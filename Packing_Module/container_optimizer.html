<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Pumps - Pro Packing Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-900">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border">
        <!-- Header -->
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center border-b-4 border-blue-600">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">Prakash Pumps</h1>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Hybrid Loading Optimization v2.0</p>
            </div>
            <select id="contType" class="bg-slate-800 p-3 rounded-xl font-bold outline-none border border-slate-700 text-sm" onchange="runOptimization()">
                <option value="20ft">20' Standard (33.2 CBM)</option>
                <option value="40ft">40' High Cube (76.4 CBM)</option>
            </select>
        </div>

        <div class="p-6">
            <!-- Data Entry -->
            <div class="grid grid-cols-2 md:grid-cols-6 gap-4 bg-white p-6 rounded-2xl border-2 border-slate-200 mb-8 shadow-sm">
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Model Name</label>
                    <input type="text" id="mName" value="NRV" class="w-full p-3 border-2 border-slate-200 rounded-xl font-black uppercase focus:border-blue-500 outline-none">
                </div>
                <div class="flex gap-2 md:col-span-2 text-center">
                    <div class="w-1/3"><label class="text-[9px] font-bold">L (mm)</label><input type="number" id="pL" value="138" class="w-full p-3 border-2 border-slate-200 rounded-xl text-center font-bold"></div>
                    <div class="w-1/3"><label class="text-[9px] font-bold">W (mm)</label><input type="number" id="pW" value="138" class="w-full p-3 border-2 border-slate-200 rounded-xl text-center font-bold"></div>
                    <div class="w-1/3"><label class="text-[9px] font-bold">H (mm)</label><input type="number" id="pH" value="116" class="w-full p-3 border-2 border-slate-200 rounded-xl text-center font-bold"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-600 uppercase">Total Qty</label>
                    <input type="number" id="pQty" value="500" class="w-full p-3 border-2 border-blue-500 rounded-xl font-black text-blue-600">
                </div>
                <button onclick="addAndPack()" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition-all active:scale-95 uppercase text-xs">Analyze & Pack</button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-6 mb-8 text-center">
                <div class="bg-slate-50 p-5 rounded-2xl border-b-4 border-blue-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">CBM Used</p>
                    <h2 id="usedCBM" class="text-4xl font-black text-slate-800">0.00</h2>
                </div>
                <div class="bg-slate-50 p-5 rounded-2xl border-b-4 border-yellow-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Free Space</p>
                    <h2 id="freeCBM" class="text-4xl font-black text-slate-800">33.20</h2>
                </div>
                <div id="percBox" class="bg-slate-900 text-white p-5 rounded-2xl border-b-4 border-green-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Load Capacity</p>
                    <h2 id="loadPerc" class="text-4xl font-black text-green-400">0%</h2>
                </div>
            </div>

            <!-- Main Table -->
            <div class="bg-white border-2 border-slate-200 rounded-3xl overflow-hidden shadow-sm mb-8">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 border-b-2 border-slate-200">
                        <tr class="text-slate-600 text-[11px] uppercase tracking-tighter">
                            <th class="p-5 font-black">Model Information</th>
                            <th class="p-5 font-black text-center">Crate Size (Inch)</th>
                            <th class="p-5 font-black text-center">Arrangement (LxWxH)</th>
                            <th class="p-5 font-black text-center">Qty/Crate</th>
                            <th class="p-5 font-black text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableData" class="divide-y divide-slate-100">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Visualizers -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-xs font-black text-slate-400 mb-3 uppercase">Container Elevation (Front)</h3>
                    <div id="frontView" class="container-box shadow-inner"></div>
                </div>
                <div>
                    <h3 class="text-xs font-black text-slate-400 mb-3 uppercase">Floor Map (Top View)</h3>
                    <div id="topView" class="container-box shadow-inner"></div>
                </div>
            </div>
            
            <button onclick="resetData()" class="w-full mt-12 py-4 text-red-500 font-black border-2 border-red-100 rounded-2xl uppercase hover:bg-red-50 transition-all tracking-widest text-sm">Empty Entire Container</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
