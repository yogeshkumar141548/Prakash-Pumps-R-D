<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Pumps - Shaft Cutting Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="prakash logo.jfif" alt="Prakash Logo" class="right-logo">
            <h1>Prakash Pump</h1>
            <p>Shaft Cutting Management System</p>
        </header>

        <section class="section">
            <h2>1. Shaft Details</h2>
            <div class="input-group">
                <input id="model" list="modelList" placeholder="Select or Type Model" oninput="autoFillDetails()">
                <datalist id="modelList"></datalist>
                
                <input id="diameter" type="number" placeholder="Diameter (mm)" step="0.1">
                <input id="length" type="number" placeholder="Length" step="0.1">
                <select id="uom"></select>
                <input id="qty" type="number" placeholder="Quantity" min="1" value="1" style="flex: 0.5; min-width: 80px;">
                <button id="addBtn" onclick="addData()" class="btn-primary">Add / Update</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Model Name</th>
                            <th>Diameter (mm)</th>
                            <th>Length</th>
                            <th>Unit</th>
                            <th>Order Quantity</th>
                            <th style="width: 150px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableData"></tbody>
                </table>
            </div>
        </section>

        <hr class="divider">

        <section class="section">
            <h2>2. Raw Material (Round Bar) Details</h2>
            <div class="input-group">
                <!-- step="any" allows decimal values like 20.1 -->
                <input id="barLength" type="number" placeholder="Raw Bar Length" step="any">
                <select id="barUnit"></select>
                <button onclick="perfectOptimize()" class="btn-optimize">🚀 Calculate Optimized Plan</button>
            </div>
            <div id="result"></div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="downloadPDF()" class="btn-primary" style="background: #28a745;">Download PDF</button>
                <a href="../index.html" class="back-home-btn" style="text-decoration: none; padding: 10px 20px; background: #6c757d; color: white; border-radius: 5px;">Back to Home</a>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    <script>
        function downloadPDF() {
            const printContent = document.getElementById("result").innerHTML;
            if (!printContent) return alert("Pehle plan calculate karein!");
            
            const originalContent = document.body.innerHTML;
            document.body.innerHTML = `
                <div style="padding: 20px;">
                    <h2 style="text-align:center;">Prakash Pumps - Cutting Plan</h2>
                    ${printContent}
                </div>`;
            window.print();
            document.body.innerHTML = originalContent;
            window.location.reload(); // To restore event listeners
        }
    </script>
</body>
</html>
