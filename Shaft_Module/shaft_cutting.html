<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Pumps - Shaft Cutting Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="prakash logo.jfif" alt="Prakash Logo" class="right-logo">
            <h1>Prakash Pump</h1>
            <p>Shaft Cutting Management System</p>
        </header>

        <section class="section">
            <h2>1. Shaft Details</h2>
            <div class="input-group">
                <!-- Select or type the specific pump model -->
                <input id="model" list="modelList" placeholder="Select or Type Model" oninput="autoFillDetails()">
                <datalist id="modelList"></datalist>
                
                <input id="diameter" type="number" placeholder="Diameter (mm)" step="0.1">
                <input id="length" type="number" placeholder="Length" step="0.1">
                <select id="uom"></select>
                <input id="qty" type="number" placeholder="Quantity" min="1" value="1" style="flex: 0.5; min-width: 80px;">
                <button id="addBtn" onclick="addData()" class="btn-primary">Add / Update</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Model Name</th>
                            <th>Diameter (mm)</th>
                            <th>Length</th>
                            <th>Unit</th>
                            <th>Order Quantity</th>
                            <th style="width: 150px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableData"></tbody>
                </table>
            </div>
        </section>

        <hr class="divider">

        <section class="section">
            <h2>2. Raw Material (Round Bar) Details</h2>
            <div class="input-group">
                <input id="barLength" type="number" placeholder="Raw Bar Length">
                <select id="barUnit"></select>
                <!-- Changed 'Calculate Diameter-wise Plan' for better English clarity -->
                <button onclick="perfectOptimize()" class="btn-optimize">🚀 Calculate Optimized Cutting Plan</button>
            </div>
            <div id="result"></div>
            <!-- Button For Pdf Download -->
<button onclick="downloadPDF()">Download PDF</button>

            <script>
function downloadPDF() {
    var printContent = document.getElementById("result").innerHTML;
    var originalContent = document.body.innerHTML;

    document.body.innerHTML = printContent;

    window.print();

    document.body.innerHTML = originalContent;
}
</script>
            
        </section>
    </div>
    <script src="script.js"></script>
    <body>

</body>
<div class="container">
   ...
</div>

</body>
</body>
</html>
