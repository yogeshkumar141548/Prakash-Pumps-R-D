<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Pumps - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="prakash logo.jfif" alt="Prakash Logo" class="right-logo">
            <h1>Prakash Pump</h1>
            <p>R&D Shaft Cutting, Weight & Scrap Optimizer</p>
        </header>

        <section class="section">
            <h2>1. Requirements & Material Settings</h2>
            <div class="input-group">
                <input id="model" list="modelList" placeholder="Model Name" oninput="autoFillDetails()">
                <datalist id="modelList"></datalist>
                <input id="diameter" type="number" placeholder="Dia (mm)" step="0.1">
                <input id="length" type="number" placeholder="Length" step="0.1">
                <select id="uom"></select>
                <input id="qty" type="number" placeholder="Qty" min="1" value="1">
            </div>
            
            <div class="input-group" style="background: #fff8e1; border: 1px solid #ffe082;">
                <select id="materialType">
                    <option value="7.85">Steel / SS420 (7.86)</option>
                    <option value="8.0">SS High Grade (8.0)</option>
                    <option value="2.7">Aluminum (2.7)</option>
                    <option value="8.96">Copper (8.96)</option>
                    <option value="8.5">Brass (8.5)</option>
                </select>
                <input id="kerf" type="number" placeholder="Blade Kerf (mm)" step="0.1" value="3">
                <button id="addBtn" onclick="addData()" class="btn-primary">Add Shaft</button>
            </div>
            
            <div style="margin-bottom: 15px; font-size: 0.85em;" class="no-print">
                <strong>excel Import:</strong> <input type="file" id="csvFile" accept=".csv" onchange="importCSV()">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Model</th><th>Dia</th><th>Length</th><th>Unit</th><th>Qty</th><th>Action</th></tr>
                    </thead>
                    <tbody id="tableData"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <h2>2. Roundbar Detail</h2>
            <div class="input-group" style="background:#eef2f7; padding:15px; border-radius:8px;">
                <input id="barDia" type="number" placeholder="Bar Dia (mm)" step="0.1">
                <input id="barLength" type="number" placeholder="Length" step="any">
                <select id="barUnit"></select>
                <input id="barQty" type="number" placeholder="Qty" min="1" value="1" style="max-width: 100px;">
                <button id="addBarBtn" onclick="addRawBar()" class="btn-primary" style="background:#28a745;">Add to Stock</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Diameter (mm)</th><th>Length</th><th>Unit</th><th>Qty</th><th>Action</th></tr>
                    </thead>
                    <tbody id="rawBarTable"></tbody>
                </table>
            </div>

            <div class="no-print" style="margin-top:20px; display:flex; gap:10px; justify-content: space-between; flex-wrap: wrap;">
                <button onclick="clearRequirementsTable()" class="btn-primary" style="background:#e67e22; font-size:0.9rem;">🧹 Clear Requirements Only</button>
                <button onclick="clearStockTable()" class="btn-primary" style="background:#e67e22; font-size:0.9rem;">🧹 Clear Stock Only</button>
                <button onclick="masterAllClear()" class="btn-primary" style="background:var(--danger); font-size:0.9rem;">🚨 Master All Clear (Both Tables)</button>
            </div>

            <button onclick="perfectOptimize()" class="btn-optimize" style="margin-top:15px;">🚀 Run Optimization & Check Suggestions</button>
        </section>

        <section class="section" id="result-section">
            <div id="result"></div>
            <div class="no-print" style="margin-top:20px; display:flex; gap:10px; flex-wrap: wrap;">
                <button onclick="window.print()" class="btn-primary" style="background:#28a745;">🖨️ Download PDF</button>
                <button onclick="exportData()" class="btn-primary" style="background:#6c757d;">📤 Export (For other PC)</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-primary" style="background:#6c757d;">📥 Import Data</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
                <a href="../index.html" class="back-home-btn" style="text-decoration:none;">Back to Home</a>
            </div>
        </section>

        <section class="section no-print" style="margin-top: 50px; border-top: 2px solid #eee; padding-top: 20px;">
            <h2>3. History & Backups (Last 30 Days)</h2>
            <div style="margin-bottom: 15px; display: flex; justify-content: flex-end;">
                <button onclick="clearAllHistory()" class="btn-primary" style="background: var(--danger); font-size: 0.85rem;">🗑️ Clear All History</button>
            </div>
            <div id="historyList" style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; padding: 10px;"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
